name: Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate operators
      run: |
        for f in operators/*/operator.json; do
          echo "=== $f ==="
          python validate.py --operator "$f"
        done

    - name: Validate logs
      run: |
        for f in operators/*/logs/*.json; do
          echo "=== $f ==="
          python validate.py --log "$f"
        done